                <br>

                    <b>Registrate 🔑</b>

    <hr>

    <center>
        <br>
        <form action="#" method="POST">
            <fieldset style="width: 450px; background-color: #fafafa; padding: 15px;">
                <legend><h3>Formulario de Registro</h3></legend>
                
                <table border="0" cellpadding="8" cellspacing="0" width="100%">
                    <tr>
                        <td align="right" width="45%"><label for="usuario_mc"><strong>Usuario de Minecraft:</strong></label></td>
                        <td align="left" width="55%"><input type="text" id="usuario_mc" name="usuario_mc" size="22" placeholder="Tu nick en el juego" required></td>
                    </tr>
                    <tr>
                        <td align="right"><label for="password_mc"><strong>Contraseña:</strong></label></td>
                        <td align="left"><input type="password" id="password_mc" name="password_mc" size="22" placeholder="Mínimo 8 caracteres" minlength="8" required></td>
                    </tr>
                    <tr>
                        <td align="right"><label for="sexo_mc"><strong>Sexo:</strong></label></td>
                        <td align="left">
                            <select id="sexo_mc" name="sexo_mc" required style="width: 175px;">
                                <option value="" disabled selected>Selecciona una opción</option>
                                <option value="femenino">Femenino</option>
                                <option value="masculino">Masculino</option>
                                <option value="otro">Otro / Prefiero no decirlo</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td align="right">
                            <br>
                            <a href="index.html" style="color: red; text-decoration: none; font-size: 14px;"><strong>[Cancelar X]</strong></a>
                        </td>
                        <td align="left">
                            <br>
                            <button type="submit" style="cursor: pointer; padding: 6px 15px;">
                                <strong>Enviar Registro 🚀</strong>
                            </button>
                        </td>
                    </tr>
                </table>
            </fieldset>
        </form>
        <br><br>
    </center>
